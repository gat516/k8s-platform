apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-platform
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-platform
  template:
    metadata:
      labels:
        app: k8s-platform
    spec:
      serviceAccountName: k8s-platform
      containers:
        - name: k8s-platform
          # CI overrides this tag with the short git SHA on every deploy
          image: ghcr.io/gat516/k8s-platform:SHA
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ENVIRONMENT
              value: production
            - name: CORS_ORIGINS
              value: https://lcpatterns.dev,https://www.lcpatterns.dev,https://dashboard.lcpatterns.dev
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 64Mi
              cpu: 200m
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
