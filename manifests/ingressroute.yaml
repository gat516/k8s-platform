apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: k8s-platform
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    # Public endpoints — /health for uptime checks, /api/ for the React dashboard.
    # /metrics stays cluster-internal for Prometheus only.
    - match: Host(`api.lcpatterns.dev`) && PathPrefix(`/health`)
      kind: Rule
      services:
        - name: k8s-platform
          port: 8080
    - match: Host(`api.lcpatterns.dev`) && PathPrefix(`/api/`)
      kind: Rule
      services:
        - name: k8s-platform
          port: 8080
