name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
      - run: cd src && go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/gat516/k8s-platform:${{ steps.vars.outputs.sha_short }}
          build-args: VERSION=${{ steps.vars.outputs.sha_short }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > /tmp/kubeconfig.yaml
          chmod 600 /tmp/kubeconfig.yaml
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.34.0'
      - name: Deploy to cluster
        env:
          KUBECONFIG: /tmp/kubeconfig.yaml
        run: |
          sed "s|ghcr.io/gat516/k8s-platform:SHA|ghcr.io/gat516/k8s-platform:${{ needs.build.outputs.sha_short }}|" manifests/deployment.yaml | kubectl apply -f -
          kubectl apply -f manifests/service.yaml
          kubectl rollout status deployment/k8s-platform --timeout=120s
      - name: Rollback on failure
        if: failure()
        env:
          KUBECONFIG: /tmp/kubeconfig.yaml
        run: kubectl rollout undo deployment/k8s-platform
      - name: Cleanup kubeconfig
        if: always()
        run: rm -f /tmp/kubeconfig.yaml
