## Bitnami Redis — session cache + race room state
## Installed once (not managed by CI):
##   helm repo add bitnami https://charts.bitnami.com/bitnami && helm repo update
##   helm install redis bitnami/redis \
##     --set auth.password=<redis-pass> \
##     -f infrastructure/redis-values.yaml
##
## In-cluster DNS: redis-master.default.svc.cluster.local:6379

architecture: standalone    # no replication; single-node VPS

auth:
  enabled: true
  password: ""              # set via --set auth.password=<secret> at install time

master:
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m
  persistence:
    enabled: true
    size: 1Gi

metrics:
  enabled: true             # Prometheus scrapes via ServiceMonitor
  resources:
    requests:
      memory: 16Mi
      cpu: 10m
    limits:
      memory: 32Mi
      cpu: 50m
